  }

  // === Helpers ===
  function getCurrentScene() { return state.scenes.find(s => s.id === state.currentSceneId); }
  function getSelectedHotspot() {
    const scn = getCurrentScene();
    if (!scn) return null;
    return scn.hotspots.find(h => h.id === state.selectedHotspotId) || null;
  }

  // === Toolbar Events ===
  document.getElementById('btn-add-scene').addEventListener('click', () => fileScene.click());
  document.getElementById('btn-save').addEventListener('click', saveProject);
  document.getElementById('btn-load').addEventListener('click', async () => {
    if (window.showOpenFilePicker) {
      try {
        const [handle] = await window.showOpenFilePicker({
          types: [{ description: 'JSON Project', accept: { 'application/json': ['.json'] } }]
        });
        const file = await handle.getFile();
        const text = await file.text();
        loadProject(text);
        return;
      } catch (e) {
        if (e.name === 'AbortError') return;
      }
    }
    fileLoad.click();
  });
  document.getElementById('btn-export').addEventListener('click', exportTour);

  fileScene.addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    for (const file of files) {
      const result = await processImage(file);
      addScene(result.dataUrl, file.name.replace(/\.[^.]+$/, ''), result.isStereo);
    }
    fileScene.value = '';
  });

  fileLoad.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => loadProject(ev.target.result);
    reader.readAsText(file);
    fileLoad.value = '';
  });

  // === Context Menu ===
  const ctxMenu = document.getElementById('ctx-menu');
  let ctxTargetScene = null;

  function showContextMenu(x, y, scn) {
    ctxTargetScene = scn;
    ctxMenu.style.left = x + 'px';
    ctxMenu.style.top = y + 'px';
    ctxMenu.style.display = 'block';
  }

  function hideContextMenu() {
    ctxMenu.style.display = 'none';
    ctxTargetScene = null;
  }

  document.addEventListener('click', hideContextMenu);

  document.getElementById('ctx-rename').addEventListener('click', () => {
    if (!ctxTargetScene) return;
    const scn = ctxTargetScene;
    hideContextMenu();
    const item = sceneListEl.querySelector(`[data-scene-id="${scn.id}"]`);
    if (item) {
      const span = item.querySelector('span');
      if (span) inlineRenameScene(item, span, scn);
    }
  });

  document.getElementById('ctx-delete').addEventListener('click', () => {
    if (!ctxTargetScene) return;
    const scn = ctxTargetScene;
    hideContextMenu();
    if (!confirm('Delete scene "' + scn.name + '"? All hotspots targeting it will also be removed.')) return;
    const scnId = scn.id;
    // Remove hotspots targeting this scene from all other scenes
    state.scenes.forEach(s => {
      s.hotspots = s.hotspots.filter(h => !(h.type === 'nav' && h.target == scnId));
    });
    // Remove the scene
    state.scenes = state.scenes.filter(s => s.id !== scnId);
    if (state.currentSceneId === scnId) {
      if (state.scenes.length > 0) {
        selectScene(state.scenes[0].id);
      } else {
        state.currentSceneId = null;
        deselectHotspot();
        renderer.domElement.style.display = 'none';
        emptyState.style.display = 'block';
      }
    }
    renderSceneList();
  });

  // === Keyboard Shortcuts ===
  document.addEventListener('keydown', (e) => {
    const tag = (e.target.tagName || '').toLowerCase();
    if (tag === 'input' || tag === 'textarea' || tag === 'select') return;

    if (e.key === 'Delete') {
      const scn = getCurrentScene();
      const hs = getSelectedHotspot();
      if (scn && hs) {
        scn.hotspots = scn.hotspots.filter(h => h.id !== hs.id);
        deselectHotspot();
      }
    } else if (e.key === 'Escape') {
      deselectHotspot();
    } else if (e.ctrlKey && e.key === 's') {
      e.preventDefault();
      saveProject();
    } else if (e.ctrlKey && e.key === 'e') {
      e.preventDefault();
      exportTour();
    }
  });

  // === Floor Plan Editor ===
  const fpModal = document.getElementById('floorplan-modal');
  const fpCanvas = document.getElementById('floorplan-canvas');
  const fpCtx = fpCanvas.getContext('2d');
  const fileFloorplan = document.getElementById('file-floorplan');
  let fpImage = null;
  let fpDragging = null; // scene id being dragged

  document.getElementById('btn-floorplan').addEventListener('click', () => {
    fpModal.classList.add('open');
    requestAnimationFrame(() => loadFloorPlanImage(() => drawFloorPlan()));
  });
  document.getElementById('fp-close').addEventListener('click', () => fpModal.classList.remove('open'));
  document.getElementById('fp-upload').addEventListener('click', () => fileFloorplan.click());
  document.getElementById('fp-remove').addEventListener('click', () => {
    state.floorPlan = null;
    fpImage = null;
    state.scenes.forEach(s => { s.planX = null; s.planY = null; });
    drawFloorPlan();
  });

  function setFloorPlanAndDraw(dataUrl) {
    state.floorPlan = dataUrl;
    loadFloorPlanImage(() => {
      const unplaced = state.scenes.filter(s => s.planX == null);
      if (unplaced.length === state.scenes.length && unplaced.length > 0) {
        const cols = Math.ceil(Math.sqrt(unplaced.length));
        unplaced.forEach((s, i) => {
          s.planX = ((i % cols) + 0.5) / cols;
          s.planY = (Math.floor(i / cols) + 0.5) / Math.ceil(unplaced.length / cols);
        });
      }
      drawFloorPlan();
    });
  }

  fileFloorplan.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    if (file.type === 'application/pdf' || file.name.toLowerCase().endsWith('.pdf')) {
      // Render PDF first page to image
      const arrayBuf = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuf }).promise;
      const page = await pdf.getPage(1);
      const scale = 2;
      const viewport = page.getViewport({ scale });
      const canvas = document.createElement('canvas');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      const ctx = canvas.getContext('2d');
      await page.render({ canvasContext: ctx, viewport }).promise;
      setFloorPlanAndDraw(canvas.toDataURL('image/png'));
    } else {
      const reader = new FileReader();
      reader.onload = (ev) => setFloorPlanAndDraw(ev.target.result);
      reader.readAsDataURL(file);
    }
    fileFloorplan.value = '';
  });

  function loadFloorPlanImage(cb) {
    if (!state.floorPlan) { fpImage = null; if (cb) cb(); return; }
    if (fpImage && fpImage.src === state.floorPlan) { if (cb) cb(); return; }
    const img = new Image();
    img.onload = () => { fpImage = img; if (cb) cb(); };
    img.src = state.floorPlan;
  }

  function drawFloorPlan() {
    const container = document.getElementById('floorplan-body');
    const cw = container.clientWidth || 800;
    const ch = container.clientHeight || 600;
    fpCanvas.width = cw;
    fpCanvas.height = ch;
    fpCtx.clearRect(0, 0, cw, ch);

    let drawX = 0, drawY = 0, drawW = cw, drawH = ch;

    if (fpImage) {
      const imgAspect = fpImage.width / fpImage.height;
      const canAspect = cw / ch;
      if (imgAspect > canAspect) {
        drawW = cw; drawH = cw / imgAspect;
        drawX = 0; drawY = (ch - drawH) / 2;
      } else {
        drawH = ch; drawW = ch * imgAspect;
        drawX = (cw - drawW) / 2; drawY = 0;
      }
      fpCtx.fillStyle = '#0a0a1a';
      fpCtx.fillRect(0, 0, cw, ch);
      fpCtx.drawImage(fpImage, drawX, drawY, drawW, drawH);
      fpCtx.fillStyle = 'rgba(0,0,0,0.15)';
      fpCtx.fillRect(drawX, drawY, drawW, drawH);
    } else {
      fpCtx.fillStyle = '#1a1a3a';
      fpCtx.fillRect(0, 0, cw, ch);
      // Grid lines for reference
      fpCtx.strokeStyle = 'rgba(255,255,255,0.06)';
      fpCtx.lineWidth = 1;
      for (let x = 0; x < cw; x += 40) { fpCtx.beginPath(); fpCtx.moveTo(x, 0); fpCtx.lineTo(x, ch); fpCtx.stroke(); }
      for (let y = 0; y < ch; y += 40) { fpCtx.beginPath(); fpCtx.moveTo(0, y); fpCtx.lineTo(cw, y); fpCtx.stroke(); }
    }

    // Store draw area for hit testing (full canvas when no image)
    fpCanvas._drawArea = { x: drawX, y: drawY, w: drawW, h: drawH };

    // Show unplaced scenes list
    const unplaced = state.scenes.filter(s => s.planX == null);
    if (unplaced.length > 0) {
      fpCtx.fillStyle = 'rgba(0,0,0,0.7)';
      fpCtx.fillRect(8, 8, 200, 20 + unplaced.length * 22);
      fpCtx.fillStyle = '#ff7a00';
      fpCtx.font = 'bold 12px sans-serif';
      fpCtx.textAlign = 'left';
      fpCtx.fillText('Click on plan to place:', 14, 24);
      unplaced.forEach((s, i) => {
        fpCtx.fillStyle = '#eee';
        fpCtx.font = '12px sans-serif';
        fpCtx.fillText('• ' + s.name, 20, 42 + i * 22);
      });
    }

    // Draw connections
    fpCtx.lineWidth = 2;
    state.scenes.forEach(s => {
      if (s.planX == null) return;
      s.hotspots.forEach(hs => {
        if (hs.type !== 'nav' || !hs.target) return;
        const ts = state.scenes.find(t => t.id === parseInt(hs.target));
        if (!ts || ts.planX == null) return;
        const x1 = drawX + s.planX * drawW, y1 = drawY + s.planY * drawH;
        const x2 = drawX + ts.planX * drawW, y2 = drawY + ts.planY * drawH;
        fpCtx.strokeStyle = 'rgba(255,122,0,0.5)';
        fpCtx.beginPath();
        fpCtx.moveTo(x1, y1);
        fpCtx.lineTo(x2, y2);
        fpCtx.stroke();
      });
    });

    // Draw scene markers
    state.scenes.forEach(s => {
      if (s.planX == null) return;
      const px = drawX + s.planX * drawW;
      const py = drawY + s.planY * drawH;
      const isCurrent = s.id === state.currentSceneId;
      const r = isCurrent ? 16 : 12;

      if (isCurrent) { fpCtx.shadowColor = '#ff7a00'; fpCtx.shadowBlur = 16; }
      fpCtx.beginPath();
      fpCtx.arc(px, py, r, 0, Math.PI * 2);
      fpCtx.fillStyle = isCurrent ? '#ff7a00' : 'rgba(100,120,160,0.85)';
      fpCtx.fill();
      fpCtx.strokeStyle = '#fff';
      fpCtx.lineWidth = 2;
      fpCtx.stroke();
      fpCtx.shadowBlur = 0;

      // Hotspot dots
      s.hotspots.forEach((hs, hi) => {
        const a = (hi / s.hotspots.length) * Math.PI * 2 - Math.PI / 2;
        const hx = px + (r + 8) * Math.cos(a);
        const hy = py + (r + 8) * Math.sin(a);
        fpCtx.beginPath();
        fpCtx.arc(hx, hy, 4, 0, Math.PI * 2);
        fpCtx.fillStyle = hs.type === 'nav' ? '#ff7a00' : hs.type === 'info' ? '#5aaeff' : '#4ecdc4';
        fpCtx.fill();
      });

      // Label
      fpCtx.fillStyle = '#fff';
      fpCtx.font = (isCurrent ? 'bold ' : '') + '12px sans-serif';
      fpCtx.textAlign = 'center';
      fpCtx.fillText(s.name, px, py + r + 16);
    });
  }

  // Drag scene markers on floor plan
  fpCanvas.addEventListener('mousedown', (e) => {
    if (!fpCanvas._drawArea) return;
    const rect = fpCanvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (fpCanvas.width / rect.width);
    const my = (e.clientY - rect.top) * (fpCanvas.height / rect.height);
    const da = fpCanvas._drawArea;

    for (const s of state.scenes) {
      if (s.planX == null) continue;
      const px = da.x + s.planX * da.w;
      const py = da.y + s.planY * da.h;
      if (Math.sqrt((mx - px) ** 2 + (my - py) ** 2) < 20) {
        fpDragging = s.id;
        return;
      }
    }
    // Click on empty floor plan area = place unplaced scene or current scene
    const nx = (mx - da.x) / da.w;
    const ny = (my - da.y) / da.h;
    if (nx >= 0 && nx <= 1 && ny >= 0 && ny <= 1) {
      const unplaced = state.scenes.find(s => s.planX == null);
      if (unplaced) {
        unplaced.planX = nx;
        unplaced.planY = ny;
        drawFloorPlan();
      }
    }
  });

  document.addEventListener('mousemove', (e) => {
    if (!fpDragging || !fpCanvas._drawArea) return;
    const rect = fpCanvas.getBoundingClientRect();
    const mx = (e.clientX - rect.left) * (fpCanvas.width / rect.width);
    const my = (e.clientY - rect.top) * (fpCanvas.height / rect.height);
    const da = fpCanvas._drawArea;
    const s = state.scenes.find(sc => sc.id === fpDragging);
    if (s) {
      s.planX = Math.max(0, Math.min(1, (mx - da.x) / da.w));
      s.planY = Math.max(0, Math.min(1, (my - da.y) / da.h));
      drawFloorPlan();
    }
  });

  document.addEventListener('mouseup', () => { fpDragging = null; });

  // === Init ===
  if (typeof THREE === 'undefined') {
    alert('Three.js failed to load. Make sure you have internet connection or open via a local server (not file://).');
  } else {
    initThree();
    setupPointerEvents();
    setupPropsEvents();
    onResize();
  }
})();
</script>
